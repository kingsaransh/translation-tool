<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Language Translator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Language Translator</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>

        <div id="toast-container" class="toast-container"></div>

        <textarea id="source-text" placeholder="Enter text to translate..." maxlength="5000"></textarea>
        <div id="char-count">Characters: <span id="char-count-val">0</span> / 5000</div>

        <div class="language-controls">
            <select id="source-lang">
                <option value="auto">Auto-Detect</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="ja">Japanese</option>
                <option value="zh">Chinese (Simplified)</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="tr">Turkish</option>
            </select>

            <button id="swap-langs" class="swap-btn" title="Swap languages and text">⇄</button>

            <select id="target-lang">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="ja">Japanese</option>
                <option value="zh">Chinese (Simplified)</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="tr">Turkish</option>
            </select>
        </div>

        <div class="input-controls">
            <button id="clear-source" class="control-btn" title="Clear input">🗑️</button>
            <button id="copy-source" class="control-btn" title="Copy input">📋</button>
            <button id="speak-source" class="control-btn" title="Speak input">🔊</button>
        </div>

        <button id="translate-btn" class="translate-btn" disabled>Translate</button>

        <div id="loading-indicator" class="loading-spinner"></div>

        <div id="output-panel" class="output-panel">
            <textarea id="target-text" readonly placeholder="Translation will appear here..."></textarea>
            <div class="output-controls">
                <button id="copy-target" class="control-btn" title="Copy translation">📋</button>
                <button id="speak-target" class="control-btn" title="Speak translation">🔊</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>Translation History</h3>
                <button id="clear-history" class="clear-history-btn" title="Clear history">Clear</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
